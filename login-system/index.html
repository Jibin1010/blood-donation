<!DOCTYPE html>
<html lang="en">
<head>
  <!-- ============================================================
       HEAD — Block 01
       Contains: Title, Meta viewport, Tailwind CSS CDN
       Purpose:  Defines page metadata and loads stylesheet
  ================================================================ -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login System | CHRIST University — FSD Lab</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Smooth fade-in animation for the card */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.55s ease-out both; }

    /* Pulse ring on the logo icon */
    @keyframes ping-slow {
      0%, 100% { transform: scale(1); opacity: 0.7; }
      50%       { transform: scale(1.15); opacity: 0.3; }
    }
    .ping-slow { animation: ping-slow 2.4s ease-in-out infinite; }
  </style>
</head>

<!-- ============================================================
     BODY — Block 02
     Contains: Everything visible on the web page
     Styled with Tailwind utility classes for layout & color
================================================================ -->
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-indigo-950 to-slate-900
             flex items-center justify-center px-4 font-sans">

  <!-- Decorative blobs -->
  <div class="pointer-events-none fixed inset-0 overflow-hidden" aria-hidden="true">
    <div class="absolute -top-40 -left-40 w-96 h-96 rounded-full bg-indigo-700 opacity-20 blur-3xl"></div>
    <div class="absolute bottom-0 right-0 w-80 h-80 rounded-full bg-violet-700 opacity-20 blur-3xl"></div>
  </div>

  <!-- Login Card -->
  <div class="fade-up relative w-full max-w-md bg-white/5 backdrop-blur-xl border border-white/10
              rounded-3xl shadow-2xl p-10 text-white">

    <!-- Logo / Header -->
    <div class="flex flex-col items-center mb-8">
      <div class="relative mb-4">
        <div class="ping-slow absolute inset-0 rounded-full bg-indigo-500 opacity-40"></div>
        <div class="relative w-16 h-16 flex items-center justify-center rounded-full
                    bg-gradient-to-br from-indigo-500 to-violet-600 shadow-lg">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-white" fill="none"
               viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.5 20.25a
                     8.25 8.25 0 0115 0" />
          </svg>
        </div>
      </div>
      <h1 class="text-2xl font-extrabold tracking-tight text-white">Welcome Back</h1>
      <p class="text-sm text-indigo-300 mt-1">Login System — CHRIST University FSD Lab</p>
    </div>

    <!-- Status Message Box (hidden by default, shown by app.js) -->
    <div id="statusMsg" class="hidden mb-5 px-4 py-3 rounded-xl text-sm font-semibold
                               text-center transition-all duration-300"></div>

    <!-- ============================================================
         FORM — Block 03
         Groups user input data together for submission
         id="loginForm" lets JavaScript attach an event listener
    ================================================================ -->
    <form id="loginForm" class="space-y-5" novalidate>

      <!-- ============================================================
           INPUTS — Block 04
           Collects: Username, Password
           Each has: type, id, placeholder, class (Tailwind), required
      ================================================================ -->

      <!-- Username Input -->
      <div>
        <label for="username"
               class="block text-xs font-bold uppercase tracking-widest text-indigo-300 mb-1.5">
          Username
        </label>
        <!-- INPUT element breakdown:
             type="text"          → defines it as text input
             id="username"        → unique identifier for JS/DOM access
             placeholder="..."    → ghost text shown before user types
             class="..."          → Tailwind utility classes for styling
             required             → browser-level submission constraint  -->
        <input type="text"
               id="username"
               name="username"
               placeholder="e.g. rahul.nair"
               required
               class="w-full bg-white/10 border border-white/20 text-white placeholder-white/30
                      rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-400
                      focus:ring-2 focus:ring-indigo-500/40 transition" />
      </div>

      <!-- Password Input -->
      <div>
        <label for="password"
               class="block text-xs font-bold uppercase tracking-widest text-indigo-300 mb-1.5">
          Password
        </label>
        <input type="password"
               id="password"
               name="password"
               placeholder="••••••••"
               required
               class="w-full bg-white/10 border border-white/20 text-white placeholder-white/30
                      rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-400
                      focus:ring-2 focus:ring-indigo-500/40 transition" />
      </div>

      <!-- ============================================================
           BUTTON — Block 05
           Triggers the action that sends credentials to the backend
           type="submit" → fires the form's "submit" event → app.js listens
      ================================================================ -->
      <button type="submit"
              id="loginBtn"
              class="w-full bg-gradient-to-r from-indigo-600 to-violet-600
                     hover:from-indigo-700 hover:to-violet-700 active:scale-[0.98]
                     text-white font-bold py-3 rounded-xl shadow-md
                     transition-all duration-200 flex items-center justify-center gap-2">
        <span id="btnText">Login to Dashboard</span>
        <svg id="btnSpinner" xmlns="http://www.w3.org/2000/svg"
             class="w-4 h-4 animate-spin hidden" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
          <path class="opacity-75" fill="currentColor"
                d="M4 12a8 8 0 018-8v8H4z"/>
        </svg>
      </button>
    </form>

    <!-- Demo credentials hint -->
    <div class="mt-6 p-4 rounded-xl bg-white/5 border border-white/10 text-xs text-indigo-300">
      <p class="font-bold text-white mb-1">🔑 Demo Credentials</p>
      <p>Username: <span class="text-indigo-200 font-mono">admin</span></p>
      <p>Password: <span class="text-indigo-200 font-mono">password123</span></p>
    </div>

    <!-- Architecture label -->
    <p class="text-center text-xs text-white/20 mt-6">
      Express.js · HTML · JavaScript · Tailwind CSS
    </p>
  </div>

  <!-- ============================================================
       app.js — Client-Side Logic
       Must be loaded AFTER the HTML form elements are in the DOM.
       Controls: Listen → Read → Send → Wait → Display
  ================================================================ -->
  <script src="app.js"></script>
</body>
</html>
